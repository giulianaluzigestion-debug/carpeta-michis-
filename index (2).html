  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function ageFromBirthdate(iso) {
    if (!iso) return '';
    const birth = new Date(iso);
    const now = new Date();
    let months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
    if (now.getDate() < birth.getDate()) months--;
    if (months < 0) return '';
    if (months < 1) return 'recién nacido';
    if (months < 12) return months + (months === 1 ? ' mes' : ' meses');
    const years = Math.floor(months / 12);
    const remMonths = months % 12;
    return years + (years === 1 ? ' año' : ' años') + (remMonths ? ' y ' + remMonths + (remMonths === 1 ? ' mes' : ' meses') : '');
  }

  // resize + compress image to keep storage small
  function processImageFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const size = 240;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

    cat.records = cat.records || { vacuna: [], visita: [], medicacion: [], cirugia: [], estudio: [] };

    const catHeaderHtml = `
      <div class="pixel-card" style="padding:1.25rem; position:relative; z-index:1;">
        <div class="pixel-tab">ficha del michi</div>
        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
          <div style="display:flex; align-items:center; gap:12px; min-width:0;">
            <div class="avatar-frame" style="width:54px; height:54px; border-radius:50%; flex-shrink:0;">
              ${cat.photo ? `<img src="${cat.photo}" alt="${escapeHtml(cat.name)}" />` : `<i class="ti ti-cat" style="font-size:26px; color:var(--pink-deep);" aria-hidden="true"></i>`}
            </div>
            <div class="truncate-1">
              <h1 class="truncate-1" style="font-size:19px; font-weight:700; margin:0; color:var(--pink-darkest);">${escapeHtml(cat.name)}</h1>
              <p style="font-size:12px; color:var(--ink-soft); margin:2px 0 0; font-weight:600;">
                ${ageFromBirthdate(cat.birthdate) || 'edad no especificada'}${cat.sex ? ' · ' + escapeHtml(cat.sex) : ''}
              </p>
              ${cat.birthdate ? `<p style="font-size:11px; color:var(--ink-soft); margin:2px 0 0; font-weight:600;">nació ${formatDate(cat.birthdate)}</p>` : ''}
            </div>
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            <button id="edit-cat-btn" class="btn-pixel-ghost btn-icon-square" aria-label="Editar datos del michi">
              <i class="ti ti-edit" style="font-size:17px;" aria-hidden="true"></i>
            </button>
            <button id="delete-cat-btn" class="btn-pixel-ghost btn-icon-square" style="color:var(--pink-darkest);" aria-label="Eliminar ficha del michi">
              <i class="ti ti-trash" style="font-size:17px;" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
    `;

    // ---------- MODE 1: section menu (no active section chosen) ----------
    if (!state.activeSection) {
      root.innerHTML = `
        <div class="pixel-bg" style="padding:1.5rem 1rem 3rem; min-height:480px;">
          <span class="pixel-decor" style="top:8px; right:5%; font-size:16px;">🎀</span>
          <span class="pixel-decor" style="bottom:6%; left:5%;">🐾</span>
          <button id="back-btn" class="btn-pixel-ghost" style="font-size:13px; padding:10px 14px; display:inline-flex; align-items:center; gap:6px; margin-bottom:1.25rem; position:relative; z-index:1;">
            <i class="ti ti-arrow-left" style="font-size:15px;" aria-hidden="true"></i> volver
          </button>

          ${catHeaderHtml}

          <p style="font-size:11px; color:var(--ink-soft); font-weight:700; margin:1.5rem 0 8px; position:relative; z-index:1;">SECCIONES</p>
          <div style="display:flex; flex-direction:column; gap:10px; position:relative; z-index:1;">
            ${SECTIONS.map(s => {
              const count = (cat.records[s.id] || []).length;
              return `
                <div class="pixel-card section-menu-card section-menu-${s.id}" data-section="${s.id}" style="padding:1rem 1.1rem; cursor:pointer; display:flex; align-items:center; gap:12px; min-height:48px;">
                  <div class="avatar-frame" style="width:40px; height:40px; border-radius:50%; flex-shrink:0;">
                    <i class="ti ${s.icon}" style="font-size:19px; color:var(--pink-deep);" aria-hidden="true"></i>
                  </div>
                  <div style="flex:1; min-width:0;">
                    <p style="font-weight:700; font-size:14px; margin:0; color:var(--ink);">${s.label}</p>
                    <p style="font-size:11px; color:var(--ink-soft); margin:2px 0 0; font-weight:600;">${count} registro${count === 1 ? '' : 's'}</p>
                  </div>
                  <i class="ti ti-chevron-right" style="font-size:18px; color:var(--pink-mid); flex-shrink:0;" aria-hidden="true"></i>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div id="modal-zone"></div>
      `;

      document.getElementById('back-btn').addEventListener('click', () => { state.screen = 'list'; render(); });
      document.getElementById('edit-cat-btn').addEventListener('click', () => openAddCatModal(cat));
      document.getElementById('delete-cat-btn').addEventListener('click', () => openDeleteCatConfirm(cat));
      root.querySelectorAll('.section-menu-card').forEach(card => {
        card.addEventListener('click', () => { state.activeSection = card.dataset.section; render(); });
      });
      return;
    }

    // ---------- MODE 2: section history view ----------
    const activeSection = SECTIONS.find(s => s.id === state.activeSection) || SECTIONS[0];
    const records = (cat.records[activeSection.id] || []).slice().sort((a, b) => {
      const dateField = activeSection.id === 'medicacion' ? 'startDate' : 'date';
      return (b[dateField] || '').localeCompare(a[dateField] || '');
    });

    root.innerHTML = `
      <div class="pixel-bg" style="padding:1.5rem 1rem 3rem; min-height:480px;">
        <span class="pixel-decor" style="top:8px; right:5%; font-size:16px;">🎀</span>
        <span class="pixel-decor" style="bottom:6%; left:5%;">🐾</span>
        <button id="back-btn" class="btn-pixel-ghost" style="font-size:13px; padding:10px 14px; display:inline-flex; align-items:center; gap:6px; margin-bottom:1.25rem; position:relative; z-index:1;">
          <i class="ti ti-arrow-left" style="font-size:15px;" aria-hidden="true"></i> secciones
        </button>

        <div class="pixel-card" style="padding:1rem 1.1rem; position:relative; z-index:1; display:flex; align-items:center; gap:10px; margin-bottom:1.5rem;">
          <div class="avatar-frame" style="width:36px; height:36px; border-radius:50%; flex-shrink:0;">
            <i class="ti ${activeSection.icon}" style="font-size:17px; color:var(--pink-deep);" aria-hidden="true"></i>
          </div>
          <h1 class="truncate-1" style="font-size:16px; font-weight:700; margin:0; color:var(--pink-darkest); flex:1;">${escapeHtml(cat.name)} · ${activeSection.label}</h1>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.9rem; position:relative; z-index:1; gap:10px;">
          <h2 class="truncate-1" style="font-size:15px; font-weight:700; margin:0; color:var(--pink-darkest);">Historial</h2>
          <button id="add-record-btn" class="btn-pixel" style="font-size:13px; padding:10px 14px; display:flex; align-items:center; gap:6px; flex-shrink:0;">
            <i class="ti ti-plus" style="font-size:15px;" aria-hidden="true"></i> agregar
          </button>
        </div>

        ${records.length === 0 ? `
          <div class="pixel-card" style="text-align:center; padding:2rem 1rem; position:relative; z-index:1;">
            <p style="color:var(--ink-soft); font-size:13px; font-weight:600; margin:0;">Todavía no hay registros de ${activeSection.label.toLowerCase()}.</p>
          </div>
        ` : `
          <div style="display:flex; flex-direction:column; gap:10px; position:relative; z-index:1;">
            ${records.map(r => renderRecordCard(r, activeSection)).join('')}
          </div>
        `}
      </div>

      <div id="modal-zone"></div>
    `;

    document.getElementById('back-btn').addEventListener('click', () => { state.activeSection = null; render(); });
    document.getElementById('add-record-btn').addEventListener('click', () => openRecordModal(cat.id, activeSection.id, null));

    records.forEach(r => {
      const editBtn = document.getElementById('rec-edit-' + r.id);
      const delBtn = document.getElementById('rec-del-' + r.id);
      if (editBtn) editBtn.addEventListener('click', () => openRecordModal(cat.id, activeSection.id, r));
      if (delBtn) delBtn.addEventListener('click', () => openDeleteRecordConfirm(cat.id, activeSection.id, r.id));
    });
  }

  function recordTitle(record, section) {
    if (section.id === 'vacuna') return record.name || 'Vacuna';
    if (section.id === 'visita') return record.reason || 'Visita';
    if (section.id === 'medicacion') return record.name || 'Medicación';
    if (section.id === 'cirugia') return record.name || 'Intervención';
    if (section.id === 'estudio') return record.name || 'Estudio';
    return 'Registro';
  }

  function renderRecordCard(record, section) {
    const dateField = section.id === 'medicacion' ? 'startDate' : 'date';
    return `
      <div class="pixel-card" style="padding:1.1rem;">
        <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
          <div style="display:flex; align-items:center; gap:9px; min-width:0;">
            <i class="ti ${section.icon}" style="font-size:17px; color:var(--pink-deep); flex-shrink:0;" aria-hidden="true"></i>
            <div class="truncate-1">
              <p class="truncate-1" style="font-weight:700; font-size:14px; margin:0; color:var(--ink);">${escapeHtml(recordTitle(record, section))}</p>
              <p class="truncate-1" style="font-size:11px; color:var(--ink-soft); margin:2px 0 0; font-weight:600;">${formatDate(record[dateField])}${record.vet ? ' · ' + escapeHtml(record.vet) : ''}</p>
            </div>
          </div>
          <div style="display:flex; gap:4px; flex-shrink:0;">
            <button id="rec-edit-${record.id}" class="btn-pixel-ghost btn-icon-square" style="box-shadow:none; min-width:38px; min-height:38px;" aria-label="Editar registro"><i class="ti ti-edit" style="font-size:14px;" aria-hidden="true"></i></button>
            <button id="rec-del-${record.id}" class="btn-pixel-ghost btn-icon-square" style="box-shadow:none; min-width:38px; min-height:38px; color:var(--pink-darkest);" aria-label="Eliminar registro"><i class="ti ti-trash" style="font-size:14px;" aria-hidden="true"></i></button>
          </div>
        </div>
        <div style="margin-top:9px; padding-top:9px; border-top:2px dashed var(--pink-soft); display:flex; flex-direction:column; gap:4px;">
          ${section.id === 'vacuna' && record.nextDose ? `<p style="font-size:12px; margin:0; font-weight:600;"><span style="color:var(--ink-soft);">Próxima dosis:</span> ${formatDate(record.nextDose)}</p>` : ''}
          ${section.id === 'visita' && record.diagnosis ? `<p style="font-size:12px; margin:0; font-weight:600;"><span style="color:var(--ink-soft);">Diagnóstico:</span> ${escapeHtml(record.diagnosis)}</p>` : ''}
          ${section.id === 'visita' && record.weight ? `<p style="font-size:12px; margin:0; font-weight:600;"><span style="color:var(--ink-soft);">Peso:</span> ${escapeHtml(record.weight)} kg</p>` : ''}
          ${section.id === 'medicacion' && record.dosage ? `<p style="font-size:12px; margin:0; font-weight:600;"><span style="color:var(--ink-soft);">Dosis:</span> ${escapeHtml(record.dosage)}${record.duration ? ' · ' + escapeHtml(record.duration) : ''}</p>` : ''}
          ${section.id === 'medicacion' && record.reason ? `<p style="font-size:12px; margin:0; font-weight:600;"><span style="color:var(--ink-soft);">Motivo:</span> ${escapeHtml(record.reason)}</p>` : ''}
          ${record.notes ? `<p style="font-size:12px; margin:0; color:var(--ink-soft); font-weight:600;">${escapeHtml(record.notes)}</p>` : ''}
          ${section.id === 'estudio' && record.file ? `
            <a href="${record.file}" download="${escapeHtml(record.fileName || 'estudio')}" style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--lilac-deep); text-decoration:none; margin-top:2px;">
              <i class="ti ti-paperclip" style="font-size:14px; flex-shrink:0;" aria-hidden="true"></i> <span class="truncate-1">${escapeHtml(record.fileName || 'descargar archivo')}</span>
            </a>
          ` : ''}
        </div>
      </div>
    `;
  }

  // ---------- Modals ----------

  function modalShell(innerHtml) {
    return `
      <div id="modal-overlay" style="position:absolute; inset:0; background:rgba(92,67,87,0.5); display:flex; align-items:center; justify-content:center; padding:0.75rem; z-index:10; border-radius: var(--border-radius-lg, 12px);">
        <div id="modal-box" class="pixel-card" style="max-width:440px; width:100%; max-height:88vh; overflow-y:auto; padding:1.25rem;">
          ${innerHtml}
        </div>
      </div>
    `;
  }

  function closeModal() {
    const zone = document.getElementById('modal-zone');
    if (zone) zone.innerHTML = '';
    state.pendingPhoto = null;
    state.pendingFile = null;
  }

  function openAddCatModal(existingCat) {
    const isEdit = !!existingCat;
    state.pendingPhoto = isEdit ? (existingCat.photo || null) : null;
    const zone = document.getElementById('modal-zone');
    zone.innerHTML = modalShell(`
      <h2 style="font-size:16px; font-weight:700; margin:0 0 1.1rem; color:var(--pink-darkest);">${isEdit ? 'Editar datos de ' + escapeHtml(existingCat.name) : 'Nuevo michi ✿'}</h2>
      <form id="cat-form" style="display:flex; flex-direction:column; gap:12px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div class="avatar-frame" id="photo-preview" style="width:84px; height:84px; border-radius:50%;">
            ${state.pendingPhoto ? `<img src="${state.pendingPhoto}" alt="" />` : `<i class="ti ti-camera" style="font-size:26px; color:var(--pink-deep);" aria-hidden="true"></i>`}
          </div>
          <label for="cf-photo-input" class="btn-pixel-ghost" style="font-size:11px; padding:6px 10px; display:inline-flex; align-items:center; gap:5px;">
            <i class="ti ti-upload" style="font-size:13px;" aria-hidden="true"></i> ${state.pendingPhoto ? 'cambiar foto' : 'subir foto'}
          </label>
          <input id="cf-photo-input" type="file" accept="image/*" style="display:none;" />
        </div>
        <div>
          <label class="field-label">Nombre *</label>
          <input id="cf-name" class="field-input" type="text" value="${isEdit ? escapeHtml(existingCat.name) : ''}" required />
        </div>
        <div style="display:flex; gap:10px;">
          <div style="flex:1;">
            <label class="field-label">Fecha de nacimiento</label>
            <input id="cf-birthdate" class="field-input" type="date" value="${isEdit ? (existingCat.birthdate || '') : ''}" />
          </div>
          <div style="flex:1;">
            <label class="field-label">Sexo</label>
            <select id="cf-sex" class="field-input">
              <option value="" ${!isEdit || !existingCat.sex ? 'selected' : ''}>—</option>
              <option value="macho" ${isEdit && existingCat.sex === 'macho' ? 'selected' : ''}>macho</option>
              <option value="hembra" ${isEdit && existingCat.sex === 'hembra' ? 'selected' : ''}>hembra</option>
            </select>
          </div>
        </div>
        <div style="display:flex; gap:8px; margin-top:8px; justify-content:flex-end;">
          <button type="button" id="cat-cancel-btn" class="btn-pixel-ghost">cancelar</button>
          <button type="submit" class="btn-pixel">${isEdit ? 'guardar cambios' : 'crear ficha ✿'}</button>
        </div>
      </form>
    `);
    document.getElementById('cat-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('cf-photo-input').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const dataUrl = await processImageFile(file);
        state.pendingPhoto = dataUrl;
        document.getElementById('photo-preview').innerHTML = `<img src="${dataUrl}" alt="" />`;
      } catch (err) {
        alert('No se pudo procesar la imagen.');
      }
    });
    document.getElementById('cat-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('cf-name').value.trim();
      if (!name) return;
      const data = {
        name,
        birthdate: document.getElementById('cf-birthdate').value,
        sex: document.getElementById('cf-sex').value,
        photo: state.pendingPhoto
      };
      if (isEdit) {
        Object.assign(existingCat, data);
      } else {
        state.cats.push({ id: uid(), ...data, records: { vacuna: [], visita: [], medicacion: [], cirugia: [], estudio: [] } });
      }
      await saveUserCats();
      closeModal();
      render();
    });
  }

  function openDeleteCatConfirm(cat) {
    const zone = document.getElementById('modal-zone');
    zone.innerHTML = modalShell(`
      <h2 style="font-size:15px; font-weight:700; margin:0 0 8px; color:var(--pink-darkest);">¿Eliminar la ficha de ${escapeHtml(cat.name)}?</h2>
      <p style="font-size:13px; color:var(--ink-soft); margin:0 0 1.25rem; font-weight:600;">Se va a borrar toda su historia médica. Esta acción no se puede deshacer.</p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="cancel-del-cat" class="btn-pixel-ghost">cancelar</button>
        <button id="confirm-del-cat" class="btn-pixel" style="background:var(--pink-darkest);">eliminar</button>
      </div>
    `);
    document.getElementById('cancel-del-cat').addEventListener('click', closeModal);
    document.getElementById('confirm-del-cat').addEventListener('click', async () => {
      state.cats = state.cats.filter(c => c.id !== cat.id);
      await saveUserCats();
      closeModal();
      state.screen = 'list';
      render();
    });
  }

  function openDeleteRecordConfirm(catId, sectionId, recordId) {
    const zone = document.getElementById('modal-zone');
    zone.innerHTML = modalShell(`
      <h2 style="font-size:15px; font-weight:700; margin:0 0 8px; color:var(--pink-darkest);">¿Eliminar este registro?</h2>
      <p style="font-size:13px; color:var(--ink-soft); margin:0 0 1.25rem; font-weight:600;">Esta acción no se puede deshacer.</p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="cancel-del-rec" class="btn-pixel-ghost">cancelar</button>
        <button id="confirm-del-rec" class="btn-pixel" style="background:var(--pink-darkest);">eliminar</button>
      </div>
    `);
    document.getElementById('cancel-del-rec').addEventListener('click', closeModal);
    document.getElementById('confirm-del-rec').addEventListener('click', async () => {
      const cat = findCat(catId);
      cat.records[sectionId] = (cat.records[sectionId] || []).filter(r => r.id !== recordId);
      await saveUserCats();
      closeModal();
      render();
    });
  }

  function openRecordModal(catId, sectionId, existingRecord) {
    const isEdit = !!existingRecord;
    const section = SECTIONS.find(s => s.id === sectionId);
    const fields = SECTION_FIELDS[sectionId];
    const record = existingRecord || {};
    state.pendingFile = isEdit ? { data: record.file || null, name: record.fileName || null } : { data: null, name: null };
    const zone = document.getElementById('modal-zone');
    zone.innerHTML = modalShell(`
      <h2 style="font-size:16px; font-weight:700; margin:0 0 1.1rem; color:var(--pink-darkest);">${isEdit ? 'Editar' : 'Nuevo'} registro · ${section.label.toLowerCase()}</h2>
      <form id="record-form" style="display:flex; flex-direction:column; gap:12px;">
        ${fields.map(f => `
          <div>
            <label class="field-label">${f.label}</label>
            ${f.type === 'textarea'
              ? `<textarea id="rf-${f.id}" class="field-input" rows="2" placeholder="${f.placeholder || ''}">${escapeHtml(record[f.id] || '')}</textarea>`
              : `<input id="rf-${f.id}" class="field-input" type="${f.type}" value="${escapeHtml(record[f.id] || '')}" placeholder="${f.placeholder || ''}" ${f.required ? 'required' : ''} />`
            }
          </div>
        `).join('')}
        ${section.hasFile ? `
          <div>
            <label class="field-label">Archivo del estudio</label>
            <div id="file-preview" style="display:flex; align-items:center; gap:8px; margin-bottom:6px; ${state.pendingFile.name ? '' : 'display:none;'}">
              <i class="ti ti-file" style="font-size:15px; color:var(--lilac-deep);" aria-hidden="true"></i>
              <span id="file-preview-name" style="font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(state.pendingFile.name || '')}</span>
              <button type="button" id="file-remove-btn" class="btn-pixel-ghost" style="padding:3px 7px; font-size:10px; box-shadow:none;">quitar</button>
            </div>
            <label for="rf-file-input" class="btn-pixel-ghost" style="font-size:12px; padding:8px 12px; display:inline-flex; align-items:center; gap:6px;">
              <i class="ti ti-upload" style="font-size:14px;" aria-hidden="true"></i> ${state.pendingFile.name ? 'cambiar archivo' : 'subir archivo'}
            </label>
            <input id="rf-file-input" type="file" style="display:none;" />
            <p style="font-size:10px; color:var(--ink-soft); margin:6px 0 0; font-weight:600;">Hasta 4 MB aprox. Si es más pesado, puede no guardarse.</p>
          </div>
        ` : ''}
        <div style="display:flex; gap:8px; margin-top:8px; justify-content:flex-end;">
          <button type="button" id="record-cancel-btn" class="btn-pixel-ghost">cancelar</button>
          <button type="submit" class="btn-pixel">${isEdit ? 'guardar cambios' : 'agregar ✿'}</button>
        </div>
      </form>
    `);
    document.getElementById('record-cancel-btn').addEventListener('click', closeModal);
    if (section.hasFile) {
      document.getElementById('rf-file-input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) {
          alert('Ese archivo pesa más de 4 MB y probablemente no se pueda guardar. Probá con uno más liviano o comprimilo antes de subirlo.');
          e.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
          state.pendingFile = { data: ev.target.result, name: file.name };
          document.getElementById('file-preview').style.display = 'flex';
          document.getElementById('file-preview-name').textContent = file.name;
          document.querySelector('label[for="rf-file-input"]').innerHTML = '<i class="ti ti-upload" style="font-size:14px;" aria-hidden="true"></i> cambiar archivo';
        };
        reader.onerror = () => alert('No se pudo leer el archivo.');
        reader.readAsDataURL(file);
      });
      const removeBtn = document.getElementById('file-remove-btn');
      if (removeBtn) {
        removeBtn.addEventListener('click', () => {
          state.pendingFile = { data: null, name: null };
          document.getElementById('file-preview').style.display = 'none';
          document.getElementById('rf-file-input').value = '';
        });
      }
    }
    document.getElementById('record-form').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {};
      let valid = true;
      fields.forEach(f => {
        const el = document.getElementById('rf-' + f.id);
        const val = el.value.trim();
        if (f.required && !val) valid = false;
        data[f.id] = val;
      });
      if (!valid) return;
      if (section.hasFile) {
        data.file = state.pendingFile.data;
        data.fileName = state.pendingFile.name;
      }
      const cat = findCat(catId);
      cat.records = cat.records || { vacuna: [], visita: [], medicacion: [], cirugia: [], estudio: [] };
      cat.records[sectionId] = cat.records[sectionId] || [];
      if (isEdit) {
        Object.assign(existingRecord, data);
      } else {
        cat.records[sectionId].push({ id: uid(), ...data });
      }
      await saveUserCats();
      closeModal();
      render();
    });
  }

  // ---------- Init ----------
  initLogin();
})();
</script>
</body>
</html>
